services:
    postgres:
        build: postgres
        image: kjelstromjr/csc468-postgres:latest
        container_name: postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: admin
            POSTGRES_DB: database
        cpus: 0.5
        mem_limit: 256m
        memswap_limit: 512m
        cpuset: "0"
        cap_drop:
            - ALL
        cap_add:
            - SETUID
            - SETGID
            - CHOWN
            - DAC_OVERRIDE
            - FOWNER
        security_opt:
            - no-new-privileges:true
        volumes:
            - postgres_data:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U admin -d database"]
            interval: 5s
            timeout: 5s
            retries: 5

    node:
        build: node
        image: kjelstromjr/csc468-node:latest
        container_name: node
        user: "node"
        cpus: 1
        mem_limit: 1g
        memswap_limit: 2g
        cpuset: "1"
        cap_drop:
            - ALL
        security_opt:
            - no-new-privileges:true
        ports:
            - "8080:8080"
        depends_on:
            postgres:
                condition: service_healthy
        command: node app.js

volumes:
    postgres_data: