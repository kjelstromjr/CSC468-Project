<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Employee Management System</h1>
        <div id="logout" onclick="logout()">Logout</div>
    </header>

    <div class="container">
        <div id="alert-container"></div>

        <div class="card">
            <h2>Log Hours</h2>
            <form id="add-hours-form">
                <div class="form-row">
                    <input type="hidden" name="employee_id" id="hours_employee_id" value="">
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label for="amount">Hours Worked</label>
                        <input type="number" id="amount" name="amount" min="1" max="24" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Log Hours</button>
            </form>
        </div>

        <div class="card">
            <h2>Hours Worked</h2>
            <div id="hours-table-container" class="hidden">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Hours</th>
                        </tr>
                    </thead>
                    <tbody id="hours-tbody">
                    </tbody>
                </table>
            </div>
            <div id="hours-empty" class="empty-state hidden">
                <p>No hours logged.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="login.js"></script>
    <script src="home.js"></script>
</body>

</html>
